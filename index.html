<!DOCTYPE html><html lang="en"><head>    <meta charset="utf-8">    <title>Gala Table Tennis - Electrified</title>    <style>        body { margin: 0; background: #020408; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Orbitron', sans-serif; }        #scaler { display: flex; flex-direction: column; align-items: center; transform-origin: center; }        #game-container { position: relative; background: #000; border: 4px solid #1a1a1a; border-radius: 8px; width: 600px; height: 800px; }        canvas { cursor: none; display: block; }        #ui { display: flex; gap: 10px; background: rgba(10,10,10,0.95); padding: 10px; border-radius: 0 0 10px 10px; border: 1px solid #333; width: 580px; justify-content: center; margin-top: -2px; }        input { width: 100px; background: transparent; color: #ffd700; border: none; border-bottom: 1px solid #ffd700; text-align: center; font-family: 'Orbitron'; font-size: 11px; outline: none; }        button { cursor: pointer; background: #ffd700; border: none; color: #000; padding: 6px 15px; border-radius: 20px; font-weight: 900; font-size: 11px; text-transform: uppercase; }                #startOverlay, #endOverlay, #closedOverlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; text-align: center; }        #startOverlay h2, #endOverlay h2, #closedOverlay h2 { color: gold; margin-bottom: 20px; letter-spacing: 2px; }                .menu-btn { margin: 10px; padding: 15px 40px; font-size: 16px; width: 250px; border-radius: 50px; transition: 0.2s; border: none; cursor: pointer; font-family: 'Orbitron'; font-weight: 900; }        .restart-btn { background: #00ff88; color: #000; }        .restart-btn:hover { background: #00cc6e; transform: scale(1.05); }        .close-btn { background: #ff4444; color: white; }                #endOverlay, #closedOverlay { display: none; }        .mute-active { background: #ff4444; color: white; }    </style>    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet"></head><body>    <div id="scaler">        <div id="game-container">            <div id="startOverlay">                <h2>READY FOR BATTLE?</h2>                <button id="unlockAudio" class="menu-btn restart-btn">START WITH MUSIC</button>            </div>
            <div id="endOverlay">                <h2 id="winnerText">MATCH OVER</h2>                <button id="replayBtn" class="menu-btn restart-btn">NEW MATCH</button>                <button id="closeBtn" class="menu-btn close-btn">CLOSE GAME</button>            </div>
            <div id="closedOverlay">                <h2>GAME SHUTDOWN</h2>                <p style="color: #666; margin-bottom: 20px;">The arena is dark.</p>                <button id="reopenBtn" class="menu-btn restart-btn">RE-START SYSTEM</button>            </div>
            <canvas id="gameCanvas"></canvas>        </div>        <div id="ui">            <input type="text" id="p1Name" value="CHAMPION">            <input type="text" id="p2Name" value="ELITE AI">            <button id="modeBtn">AI: ON</button>            <button id="muteBtn">MUSIC: ON</button>        </div>    </div>
<script>const canvas = document.getElementById('gameCanvas');const ctx = canvas.getContext('2d');const scaler = document.getElementById('scaler');const endOverlay = document.getElementById('endOverlay');const closedOverlay = document.getElementById('closedOverlay');const startOverlay = document.getElementById('startOverlay');const winnerText = document.getElementById('winnerText');
canvas.width = 600; canvas.height = 800;
function resize() {    const scale = Math.min((window.innerHeight * 0.85) / 800, (window.innerWidth * 0.95) / 600);    scaler.style.transform = `scale(${scale})`;}window.addEventListener('resize', resize);resize();
const T_Y_TOP = 180, T_Y_BOT = 620, T_Y_MID = 400;const T_WIDTH_TOP = 360, T_WIDTH_BOT = 420;const PLAYER_SPEED = 8.5, CONST_SPEED = 5.5;
let ball, p1X, p2X, p1Score, p2Score, isAI = true, p1Swing = 0, p2Swing = 0;let serviceWait = 0, totalPoints = 0, shake = 0, timer = 90, isPaused = false, gameActive = false;let musicEnabled = true, beatStep = 0, audioCtx = null;const keys = {};
function initAudio() {    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();    if (audioCtx.state === 'suspended') audioCtx.resume();    playElectrifiedBeat();}
function playElectrifiedBeat() {    if (!gameActive || !musicEnabled || isPaused) {        setTimeout(playElectrifiedBeat, 100);        return;    }    const time = audioCtx.currentTime;    const tempo = 145;     const stepLen = 60 / tempo / 2;
    if (beatStep % 4 === 0) {        const osc = audioCtx.createOscillator();        const g = audioCtx.createGain();        osc.frequency.setValueAtTime(150, time);        osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.2);        g.gain.setValueAtTime(0.4, time);        g.gain.exponentialRampToValueAtTime(0.01, time + 0.2);        osc.connect(g); g.connect(audioCtx.destination);        osc.start(); osc.stop(time + 0.2);    }    if (beatStep % 8 === 1 || beatStep % 8 === 4 || beatStep % 8 === 6) {        const osc = audioCtx.createOscillator();        const g = audioCtx.createGain();        osc.type = 'sawtooth';        osc.frequency.setValueAtTime(55, time);        g.gain.setValueAtTime(0.08, time);        g.gain.exponentialRampToValueAtTime(0.001, time + 0.15);        const filter = audioCtx.createBiquadFilter();        filter.type = 'lowpass'; filter.frequency.value = 400;        osc.connect(filter); filter.connect(g); g.connect(audioCtx.destination);        osc.start(); osc.stop(time + 0.15);    }    if (beatStep % 2 === 1) {        const osc = audioCtx.createOscillator();        const g = audioCtx.createGain();        osc.type = 'square';        osc.frequency.setValueAtTime(800, time);        g.gain.setValueAtTime(0.02, time);        g.gain.exponentialRampToValueAtTime(0.001, time + 0.05);        osc.connect(g); g.connect(audioCtx.destination);        osc.start(); osc.stop(time + 0.05);    }
    beatStep++;    setTimeout(playElectrifiedBeat, stepLen * 1000);}
function playSfx(f, t, d, v) {    if (!audioCtx || !gameActive) return;    const o = audioCtx.createOscillator();    const g = audioCtx.createGain();    o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);    g.gain.setValueAtTime(v, audioCtx.currentTime);    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);    o.connect(g); g.connect(audioCtx.destination);    o.start(); o.stop(audioCtx.currentTime + d);}
function resetBall() {    serviceWait = 60;    ball = { x: 300, y: T_Y_MID, vx: 0, vy: 0, size: 7 };    const servingP1 = Math.floor(totalPoints / 2) % 2 === 0;    ball.nextVx = (Math.random() - 0.5) * 4;    ball.nextVy = servingP1 ? CONST_SPEED : -CONST_SPEED;}
function init() {    p1X = 300; p2X = 300; p1Score = 0; p2Score = 0; totalPoints = 0; timer = 90;     isPaused = false; gameActive = true;    resetBall();    startOverlay.style.display = 'none';    endOverlay.style.display = 'none';    closedOverlay.style.display = 'none';}
function isMatchOver() { return (p1Score >= 11 || p2Score >= 11) && Math.abs(p1Score - p2Score) >= 2 || timer <= 0; }
document.getElementById('unlockAudio').onclick = () => { initAudio(); init(); };document.getElementById('replayBtn').onclick = init;document.getElementById('reopenBtn').onclick = init;document.getElementById('closeBtn').onclick = () => { gameActive = false; endOverlay.style.display = 'none'; closedOverlay.style.display = 'flex'; };
document.getElementById('modeBtn').onclick = function() { isAI = !isAI; this.innerText = isAI ? "AI: ON" : "AI: OFF"; };document.getElementById('muteBtn').onclick = function() { musicEnabled = !musicEnabled; this.innerText = musicEnabled ? "MUSIC: ON" : "MUSIC: OFF"; this.classList.toggle('mute-active', !musicEnabled); };
window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; if (e.code === 'Space') { e.preventDefault(); isPaused = !isPaused; } };window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
setInterval(() => { if(gameActive && !isPaused && timer > 0 && !isMatchOver()) timer--; }, 1000);
function update() {    if (!gameActive || isPaused || isMatchOver()) return;    if (shake > 0) shake *= 0.9;    if (serviceWait > 0) {        serviceWait--;        if (serviceWait === 0) { ball.vx = ball.nextVx; ball.vy = ball.nextVy; }    } else {        ball.x += ball.vx; ball.y += ball.vy;        let progress = (ball.y - T_Y_TOP) / (T_Y_BOT - T_Y_TOP);        let halfW = (T_WIDTH_TOP + (progress * (T_WIDTH_BOT - T_WIDTH_TOP))) / 2;        if (ball.x < 300 - halfW || ball.x > 300 + halfW) { ball.vx *= -1; playSfx(200, 'sine', 0.1, 0.05); }        if (ball.vy > 0 && ball.y > T_Y_BOT - 15 && ball.y < T_Y_BOT + 15 && Math.abs(ball.x - p1X) < 60) {            ball.vy = -CONST_SPEED; ball.vx = (ball.x - p1X) * 0.25; p1Swing = 1; playSfx(600, 'triangle', 0.1, 0.1); shake = 2;        }        if (ball.vy < 0 && ball.y < T_Y_TOP + 25 && ball.y > T_Y_TOP - 15 && Math.abs(ball.x - p2X) < 55) {            ball.vy = CONST_SPEED; ball.vx = (ball.x - p2X) * 0.25; p2Swing = 1; playSfx(500, 'triangle', 0.1, 0.1); shake = 2;        }        if (ball.y < 100) { p1Score++; totalPoints++; playSfx(400, 'square', 0.3, 0.05); resetBall(); }        else if (ball.y > 700) { p2Score++; totalPoints++; playSfx(400, 'square', 0.3, 0.05); resetBall(); }    }    if (keys['arrowleft'] || keys['a']) p1X -= PLAYER_SPEED;    if (keys['arrowright'] || keys['d']) p1X += PLAYER_SPEED;    p1X = Math.max(150, Math.min(450, p1X));    if (isAI) p2X += (ball.x - p2X) * 0.12;    p2X = Math.max(180, Math.min(420, p2X));    p1Swing *= 0.8; p2Swing *= 0.8;}
function drawPlayer(x, y, shirt, skin, swing, isP1) {    ctx.save(); ctx.translate(x, y);    ctx.fillStyle = shirt; let bY = isP1 ? -40 : 0; ctx.fillRect(-22, bY, 44, 45);    ctx.fillStyle = skin; let hY = isP1 ? -58 : -18; ctx.beginPath(); ctx.arc(0, hY, 14, 0, 7); ctx.fill();    ctx.save();    if (isP1) {        ctx.translate(22, -20); ctx.rotate(swing * -0.6);        ctx.fillStyle = skin; ctx.fillRect(0, -5, 15, 10);        ctx.fillStyle = '#8b4513'; ctx.fillRect(15, -15, 6, 20);        ctx.fillStyle = '#cc0000'; ctx.beginPath(); ctx.ellipse(18, -25, 12, 16, 0, 0, 7); ctx.fill();    } else {        ctx.translate(22, 20); ctx.rotate(swing * 0.6);        ctx.fillStyle = skin; ctx.fillRect(0, -5, 15, 10);        ctx.fillStyle = '#8b4513'; ctx.fillRect(15, -5, 6, 20);        ctx.fillStyle = '#222'; ctx.beginPath(); ctx.ellipse(18, 25, 12, 16, 0, 0, 7); ctx.fill();    }    ctx.restore(); ctx.restore();}
function draw() {    if (!gameActive && closedOverlay.style.display !== 'flex' && startOverlay.style.display !== 'flex') return;    ctx.save();    if (shake > 0.2) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);    ctx.fillStyle = '#05070a'; ctx.fillRect(0, 0, 600, 800);    ctx.fillStyle = '#0a3d62'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;    ctx.beginPath();    ctx.moveTo(300 - T_WIDTH_TOP/2, T_Y_TOP); ctx.lineTo(300 + T_WIDTH_TOP/2, T_Y_TOP);    ctx.lineTo(300 + T_WIDTH_BOT/2, T_Y_BOT); ctx.lineTo(300 - T_WIDTH_BOT/2, T_Y_BOT);    ctx.closePath(); ctx.fill(); ctx.stroke();    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fillRect(135, T_Y_MID - 12, 330, 3);        if(!isMatchOver()){        ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = '#fff';        ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.size, 0, 7); ctx.fill();        ctx.shadowBlur = 0;    }    drawPlayer(p1X, T_Y_BOT + 60, '#0055ff', '#ffcc99', p1Swing, true);    drawPlayer(p2X, T_Y_TOP - 60, '#cc0000', '#553311', p2Swing, false);    ctx.fillStyle = '#111'; ctx.strokeStyle = 'gold'; ctx.lineWidth = 2;    ctx.fillRect(150, 45, 300, 55); ctx.strokeRect(150, 45, 300, 55);    ctx.font = '900 28px Orbitron'; ctx.textAlign = 'center';    ctx.fillStyle = '#ff4444'; ctx.fillText(p2Score, 210, 85); ctx.fillStyle = '#fff'; ctx.fillText(":", 300, 85);    ctx.fillStyle = '#4488ff'; ctx.fillText(p1Score, 390, 85);    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;    ctx.beginPath(); ctx.roundRect(220, 5, 160, 35, 10); ctx.fill(); ctx.stroke();    ctx.textAlign = 'center'; ctx.font = '900 18px Orbitron';    ctx.fillStyle = timer < 15 ? '#ff4444' : '#ffd700';    ctx.fillText(`${timer}s REMAIN`, 300, 31);
    if (isMatchOver()) {        const p1N = document.getElementById('p1Name').value || "CHAMPION";        const p2N = document.getElementById('p2Name').value || "ELITE AI";        if (p1Score === 0 && p2Score === 0) winnerText.innerText = "TIME UP!!";        else if (p1Score === p2Score) winnerText.innerText = "IT'S A DRAW!";        else winnerText.innerText = (p1Score > p2Score ? p1N : p2N).toUpperCase() + " WINS!";        endOverlay.style.display = 'flex';    }    ctx.restore();}
function loop() { update(); draw(); requestAnimationFrame(loop); }loop();</script></body></html>
