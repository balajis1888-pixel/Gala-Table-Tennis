<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Gala Table Tennis</title>
    <style>
        body { margin: 0; background: #000; color: gold; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { border: 2px solid #333; background: #05070a; max-width: 90vw; max-height: 80vh; }
        #ui { margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: gold; border: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="status">ARENA STANDBY</div>
    <canvas id="gCanvas" width="600" height="800"></canvas>
    <div id="ui"><button id="startBtn">START GAME</button></div>

<script>
const canvas = document.getElementById('gCanvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const statusDiv = document.getElementById('status');

let ball = { x: 300, y: 400, vx: 4, vy: 4 };
let p1X = 300;
let active = false;

startBtn.onclick = () => { 
    active = true; 
    statusDiv.innerText = "SYSTEM ACTIVE";
    startBtn.style.display = 'none';
};

window.onmousemove = (e) => {
    let rect = canvas.getBoundingClientRect();
    p1X = e.clientX - rect.left;
};

function loop() {
    ctx.fillStyle = '#05070a';
    ctx.fillRect(0, 0, 600, 800);
    
    if (active) {
        ball.x += ball.vx;
        ball.y += ball.vy;
        if (ball.x < 0 || ball.x > 600) ball.vx *= -1;
        if (ball.y < 0 || ball.y > 800) ball.vy *= -1;
        
        // Simple paddle collision
        if (ball.y > 750 && Math.abs(ball.x - p1X) < 50) ball.vy *= -1;
    }

    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, 10, 0, 7);
    ctx.fill();

    ctx.fillStyle = 'blue';
    ctx.fillRect(p1X - 50, 760, 100, 15);

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
